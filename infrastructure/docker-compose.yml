services:
  # 1. El Emulador de AWS (Floci)
  floci:
    image: floci/floci:latest
    container_name: floci-aws-emulator
    ports:
      - "4566:4566"
    environment:
      - SERVICES=ecs,ecr,ec2,appautoscaling,logs
      - DEBUG=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # 2. La Base de Datos original del CRUD (MariaDB)
  database:
    image: mariadb:latest
    container_name: mariadb-server
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: "123456"
      MARIADB_DATABASE: "colombia_db"
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: